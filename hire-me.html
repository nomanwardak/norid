<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Norid | Hire Me</title>
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="hire-me-styles.css">
    <script src="hire-me-script.js" defer></script>
</head>

<body>
    <nav class="navbar">
        <div class="links-button">
            <i class="ri-menu-fill nav-icon"></i>
        </div>
        <div class="nav-links">
            <a class="nav-link" href="index.html">HOME</a>
            <div class="portfolio-links">
                <a class="nav-link portfolio-link" href="work.html">PORTFOLIOS <svg xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                        <path d="M12 14L8 10H16L12 14Z"></path>
                    </svg></a>
                <div class="portfolios-dropdown">
                    <a class="portfolio-dropdown-link" href="graphic-design-portfolio.html">Graphic Design</a>
                    <a class="portfolio-dropdown-link" href="#">Website Creation</a>
                </div>
            </div>
            <div class="services-links">
                <a class="nav-link services-link" href="services.html">SERVICES <svg xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                        <path d="M12 14L8 10H16L12 14Z"></path>
                    </svg></a>
                <div class="services-dropdown">
                    <a class="service-dropdown-link" href="#">Graphic Design</a>
                    <a class="service-dropdown-link" href="#">Website Creation</a>
                </div>
            </div>
            <a class="nav-link" href="aboutme.html">ABOUT ME</a>
            <a class="nav-link" href="contact.html">CONTACT</a>
            <a class="nav-link" href="legal.html">LEGAL</a>
        </div>
        <div class="nav-icons">
            <i class="ri-contrast-fill nav-icon" id="toggle-dark"></i>
            <a class="hire-me" href="hire-me.html">HIRE ME</a>
        </div>
    </nav>

    <main class="main">
        <div class="main-container">
            <h1 class="page-heading">Hire Me</h1>

            <form action="https://formsubmit.co/realnomanwardak@gmail.com" method="POST">
                <!-- DISABLE CAPTCHA -->
                <input type="hidden" name="_captcha" value="false">

                <!-- CUSTOM REDIRECT AFTER SUBMISSION -->
                <input type="hidden" name="_next" value="https://nomanwardak.github.io/norid/thank-you.html">

                <div class="primary-inputs">
                    <div class="input-group">
                        <label for="name">Name <span class="required">*</span></label>
                        <input class="input" type="text" id="name" name="name" placeholder="Enter your full name"
                            required>
                    </div>

                    <div class="input-group">
                        <label for="email">Email <span class="required">*</span></label>
                        <input class="input" type="email" id="email" name="email" placeholder="example@email.com"
                            required>
                        <p><em>You'll be contacted on this email.</em></p>
                    </div>
                </div>

                <div class="input-group">
                    <label for="category">Reason for Contact</label>
                    <select id="category" name="category" class="input custom-select">
                        <button><selectedcontent></selectedcontent></button>
                        <option value="work">Work With Me</option>
                        <option value="refunds">Cancellations & Refunds</option>
                        <option value="support">Support & Feedback</option>
                        <option value="other">Other (Please specify below)</option>
                    </select>
                    <input class="input other-input" id="otherInput" name="otherInput" placeholder="Reason for Contact"
                        type="text">
                </div>

                <div class="input-group">
                    <label for="message">Message <span class="required">*</span></label>
                    <textarea class="text-input" id="message" name="message"
                        placeholder="Kindly explain what you want..." required></textarea>
                </div>

                <div class="input-group checkbox-group">
                    <input type="checkbox" id="agree-to-terms" required>
                    <label for="agree-to-terms">
                        I agree to the <a href="legal.html" target="_blank">Terms of Service & Refund Policy</a>.
                    </label>
                </div>

                <button class="submit-button" type="submit">Submit</button>
            </form>




        </div>

    </main>
</body>

</html>
